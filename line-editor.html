<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ラインエディター</title>
<style>
  :root {
    --bg: #f5f6f8;
    --card-bg: #ffffff;
    --card-hover: #f0f2f5;
    --border: #e1e4e8;
    --accent: #3b82f6;
    --accent-soft: #dbeafe;
    --text: #1f2328;
    --muted: #8b949e;
    --danger: #ef4444;
    --warn: #f59e0b;
    --drag: #93c5fd;
    --shadow: rgba(0,0,0,.04);
  }
  html[data-theme="dark"] {
    --bg: #0d1117;
    --card-bg: #161b22;
    --card-hover: #1f2630;
    --border: #30363d;
    --accent: #3b82f6;
    --accent-soft: #1d2d44;
    --text: #e6edf3;
    --muted: #8b949e;
    --danger: #f85149;
    --warn: #d29922;
    --drag: #1f6feb;
    --shadow: rgba(0,0,0,.4);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Segoe UI", "Yu Gothic UI", "Meiryo", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    background: var(--card-bg);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  header h1 {
    font-size: 16px;
    margin: 0 12px 0 0;
    font-weight: 600;
  }
  button, .filebtn {
    font: inherit;
    font-size: 13px;
    padding: 6px 12px;
    border: 1px solid var(--border);
    background: var(--card-bg);
    border-radius: 6px;
    cursor: pointer;
    color: var(--text);
    transition: background .12s, border-color .12s;
  }
  button:hover, .filebtn:hover { background: var(--card-hover); border-color: var(--muted); }
  button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  button.primary:hover { background: #2563eb; }
  .filebtn { display: inline-block; }
  .filebtn input { display: none; }
  .spacer { flex: 1; }
  .stat { font-size: 12px; color: var(--muted); }

  .workspace {
    flex: 1;
    display: flex;
    min-height: 0;
  }
  .sidebar {
    flex: 0 0 240px;
    background: var(--card-bg);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .sidebar-head {
    padding: 10px 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-head .title {
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: .04em;
    flex: 1;
  }
  .chapter-list {
    flex: 1;
    overflow-y: auto;
    padding: 6px;
  }
  .chapter {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 7px 8px;
    border-radius: 6px;
    cursor: pointer;
    color: var(--text);
    font-size: 13px;
    transition: background .1s;
  }
  .chapter:hover { background: var(--card-hover); }
  .chapter.active { background: var(--accent-soft); }
  .chapter.active .chapter-name { color: var(--accent); font-weight: 600; }
  .chapter-name {
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .chapter-count {
    font-size: 10px;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
  }
  .chapter-actions {
    display: flex;
    gap: 1px;
    opacity: 0;
    transition: opacity .1s;
  }
  .chapter:hover .chapter-actions { opacity: 1; }
  .chapter-rename {
    flex: 1;
    font: inherit;
    font-size: 13px;
    padding: 2px 4px;
    border: 1px solid var(--accent);
    border-radius: 4px;
    background: var(--bg);
    color: var(--text);
    outline: none;
    min-width: 0;
  }

  main {
    flex: 1;
    overflow-y: auto;
    padding: 18px;
  }
  .list {
    max-width: 760px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    display: flex;
    align-items: stretch;
    box-shadow: 0 1px 2px var(--shadow);
    transition: box-shadow .12s, border-color .12s, opacity .12s;
  }
  .card.dragging { opacity: .4; border-color: var(--accent); }
  .card.drop-before { box-shadow: 0 -3px 0 0 var(--drag); }
  .card.drop-after { box-shadow: 0 3px 0 0 var(--drag); }

  .handle {
    flex: 0 0 34px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: grab;
    color: var(--muted);
    border-right: 1px solid var(--border);
    user-select: none;
    border-radius: 10px 0 0 10px;
  }
  .handle:active { cursor: grabbing; }
  .handle:hover { background: var(--accent-soft); color: var(--accent); }
  .handle svg { width: 16px; height: 16px; }

  .body {
    flex: 1;
    padding: 8px 10px;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }
  .line-input {
    font: inherit;
    font-size: 14px;
    line-height: 1.5;
    border: none;
    outline: none;
    resize: none;
    background: transparent;
    color: var(--text);
    width: 100%;
    overflow: hidden;
    font-family: "Segoe UI", "Yu Gothic UI", "Meiryo", monospace;
  }
  .line-input::placeholder { color: var(--muted); }

  .meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 4px;
  }
  .count {
    font-size: 11px;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
  }
  .count.warn { color: var(--warn); }
  .count.over { color: var(--danger); font-weight: 600; }
  .num { font-size: 11px; color: var(--muted); min-width: 22px; }

  .card-actions {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    padding-right: 6px;
    gap: 2px;
    opacity: 0;
    transition: opacity .12s;
  }
  .card:hover .card-actions { opacity: 1; }
  .icon-btn {
    border: none;
    background: transparent;
    padding: 4px 6px;
    color: var(--muted);
    border-radius: 6px;
    font-size: 14px;
  }
  .icon-btn:hover { background: var(--card-hover); color: var(--text); }
  .icon-btn.del:hover { color: var(--danger); }

  .add-row { max-width: 760px; margin: 12px auto 40px; text-align: center; }

  footer {
    background: var(--card-bg);
    border-top: 1px solid var(--border);
    padding: 6px 16px;
    font-size: 12px;
    color: var(--muted);
    display: flex;
    gap: 16px;
  }
  .empty {
    text-align: center;
    color: var(--muted);
    padding: 40px;
    font-size: 14px;
  }

  /* ロック画面 */
  .lock-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 20px;
  }
  .lock-overlay[hidden] { display: none; }
  .lock-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    box-shadow: 0 8px 30px var(--shadow);
    width: 100%;
    max-width: 380px;
    padding: 28px 26px;
  }
  .lock-card h2 {
    margin: 0 0 4px;
    font-size: 18px;
  }
  .lock-card .lock-sub {
    margin: 0 0 18px;
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
  }
  .lock-card input[type="password"] {
    width: 100%;
    font: inherit;
    font-size: 14px;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    outline: none;
    margin-bottom: 10px;
  }
  .lock-card input[type="password"]:focus { border-color: var(--accent); }
  .lock-card button.unlock-btn {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
    padding: 10px;
    font-size: 14px;
    margin-top: 4px;
  }
  .lock-card button.unlock-btn:hover { background: #2563eb; }
  .lock-error {
    color: var(--danger);
    font-size: 12px;
    min-height: 16px;
    margin: 6px 0 0;
  }
  .lock-note {
    font-size: 11px;
    color: var(--warn);
    line-height: 1.6;
    margin: 14px 0 0;
  }
  .remember-row {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--muted);
    margin: 4px 0 2px;
    cursor: pointer;
    user-select: none;
  }
  .remember-row input { margin: 0; cursor: pointer; }
  .lock-reset {
    margin-top: 16px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--muted);
    text-align: center;
  }
  .link-btn {
    background: none;
    border: none;
    padding: 0;
    color: var(--accent);
    cursor: pointer;
    font-size: 12px;
    text-decoration: underline;
  }
  .link-btn:hover { background: none; color: #2563eb; }
</style>
</head>
<body>
<header>
  <h1>ラインエディター</h1>
  <label class="filebtn">インポート
    <input type="file" id="importFile" accept=".txt,text/plain">
  </label>
  <button id="exportBtn">エクスポート</button>
  <button id="exportAllBtn" title="全章を1ファイルに連結して出力">全章エクスポート</button>
  <button id="addBtn" class="primary">+ 行を追加</button>
  <button id="clearBtn">全消去</button>
  <div class="spacer"></div>
  <span class="stat" id="stat"></span>
  <button id="syncBtn" title="クラウド同期設定">☁</button>
  <button id="lockBtn" title="ロックする">🔒</button>
  <button id="themeBtn" title="ダークモード切替">🌙</button>
</header>

<div class="workspace">
  <aside class="sidebar">
    <div class="sidebar-head">
      <span class="title">章</span>
      <button id="addChapterBtn" title="章を追加">＋</button>
    </div>
    <div class="chapter-list" id="chapterList"></div>
  </aside>

  <main>
    <div class="list" id="list"></div>
    <div class="add-row">
      <button id="addBtn2" class="primary">+ 行を追加</button>
    </div>
  </main>
</div>

<footer>
  <span>1行あたり
    <input type="number" id="maxInput" min="1" max="100000" value="180"
      style="width:64px; font:inherit; padding:2px 4px; border:1px solid var(--border); border-radius:4px; background:var(--card-bg); color:var(--text);">
    文字まで</span>
  <span>ハンドルをドラッグで並べ替え</span>
  <span id="overStat"></span>
</footer>

<!-- ロック画面（E2E暗号化） -->
<div class="lock-overlay" id="lockOverlay">
  <div class="lock-card">
    <h2 id="lockTitle">ロック解除</h2>
    <p class="lock-sub" id="lockSub">パスフレーズを入力してください。</p>
    <form id="lockForm">
      <input type="password" id="passInput" placeholder="パスフレーズ" autocomplete="off">
      <input type="password" id="passConfirm" placeholder="パスフレーズ（確認）" autocomplete="off" hidden>
      <label class="remember-row">
        <input type="checkbox" id="rememberPass">
        このデバイスで記憶する（次回から自動で解除）
      </label>
      <button type="submit" class="unlock-btn" id="unlockBtn">解除</button>
    </form>
    <p class="lock-error" id="lockError"></p>
    <p class="lock-note" id="lockNote" hidden>
      ⚠ パスフレーズを忘れると保存データは復元できません。安全な場所に控えてください。
    </p>
    <div class="lock-reset" id="lockResetRow" hidden>
      パスフレーズを忘れた場合は
      <button type="button" id="resetBtn" class="link-btn">初期化（全データ削除）</button>
    </div>
    <p style="margin:10px 0 0; font-size:12px; color:var(--muted); text-align:center;">
      別の端末のデータを使うには
      <button type="button" id="lockSyncBtn" class="link-btn">クラウド同期を設定</button>
    </p>
  </div>
</div>

<!-- クラウド同期設定 -->
<div class="lock-overlay" id="syncOverlay" hidden>
  <div class="lock-card">
    <h2>クラウド同期設定</h2>
    <p class="lock-sub">
      Pages に登録したトークンを入力すると、暗号文をサーバーに同期します。<br>
      空のまま保存すると同期OFF（このデバイスのみ保存）になります。
    </p>
    <input type="password" id="syncTokenInput" placeholder="同期トークン（API_TOKEN）" autocomplete="off">
    <button type="button" class="unlock-btn" id="syncSaveBtn">保存</button>
    <p class="lock-error" id="syncMsg"></p>
    <div class="lock-reset">
      <button type="button" id="syncCloseBtn" class="link-btn">閉じる</button>
    </div>
    <p class="lock-note">
      サーバーへ送られるのは暗号文のみ。トークンはこのデバイスにだけ保存されます。
    </p>
  </div>
</div>

<script>
// ---- テーマ（ダークモード） ----
const themeBtn = document.getElementById('themeBtn');
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  themeBtn.textContent = theme === 'dark' ? '☀️' : '🌙';
}
function initTheme() {
  let saved = null;
  try { saved = localStorage.getItem('lineEditorTheme'); } catch (e) {}
  if (!saved) {
    saved = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  }
  applyTheme(saved);
}
themeBtn.addEventListener('click', () => {
  const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  applyTheme(next);
  try { localStorage.setItem('lineEditorTheme', next); } catch (e) {}
});
initTheme();

let MAX = 180;
const listEl = document.getElementById('list');
const statEl = document.getElementById('stat');
const overStatEl = document.getElementById('overStat');
const chapterListEl = document.getElementById('chapterList');

// 状態
// chapters: [{ id, name, lines: [{ id, text }] }]
let chapters = [];
let currentId = null;
let lines = [];   // 現在の章の行配列への参照
let uid = 1;
let cid = 1;

function newLine(text = '') {
  return { id: uid++, text };
}
function newChapter(name, lineArr) {
  return { id: cid++, name: name || ('章 ' + cid), lines: lineArr || [newLine('')] };
}
function curChapter() {
  return chapters.find(c => c.id === currentId);
}
// 現在章の lines を差し替える（import/clear 用）
function setLines(arr) {
  const ch = curChapter();
  if (!ch) return;
  ch.lines = arr;
  lines = ch.lines;
}

// ---- 永続化 + E2E暗号化 ----
// ストレージ抽象レイヤ（第2段階でクラウドAPIへ差し替え可能）
const VAULT_KEY = 'lineEditorVault';
const LEGACY_KEY = 'lineEditorChapters';
// クラウド同期（任意）: トークンがあればPages Function経由、無ければローカルのみ
const SYNC_URL = '/api/state';
const SYNC_TOKEN_KEY = 'lineEditorApiToken';
function getToken() { try { return localStorage.getItem(SYNC_TOKEN_KEY); } catch (e) { return null; } }
function syncEnabled() { return !!getToken(); }
function localGet() { try { return localStorage.getItem(VAULT_KEY); } catch (e) { return null; } }
function localSet(s) { try { localStorage.setItem(VAULT_KEY, s); } catch (e) {} }

async function storageGetRaw() {
  const local = localGet();
  if (syncEnabled()) {
    try {
      const r = await fetch(SYNC_URL, { headers: { 'Authorization': 'Bearer ' + getToken() } });
      if (r.ok) {
        const t = await r.text();
        if (t) return t;          // リモートにデータあり → 優先
        return local || null;     // リモート空 → ローカルがあれば移行用に返す
      }
    } catch (e) { /* 通信失敗 → ローカルへフォールバック */ }
    return local || null;
  }
  return local || null;
}
async function storageSetRaw(s) {
  localSet(s); // 常にローカルにもキャッシュ（オフライン/フォールバック用）
  if (syncEnabled()) {
    try {
      await fetch(SYNC_URL, {
        method: 'PUT',
        headers: { 'Authorization': 'Bearer ' + getToken(), 'content-type': 'application/json' },
        body: s
      });
    } catch (e) { /* 通信失敗時はローカルキャッシュのみ。次回保存時に再送される */ }
  }
}

// パスフレーズのキャッシュ（このデバイスでの自動解除用・任意）
const PASS_CACHE_KEY = 'lineEditorPassCache';
function getCachedPass() { try { return localStorage.getItem(PASS_CACHE_KEY); } catch (e) { return null; } }
function cachePass(p) { try { localStorage.setItem(PASS_CACHE_KEY, p); } catch (e) {} }
function clearCachedPass() { try { localStorage.removeItem(PASS_CACHE_KEY); } catch (e) {} }

// 暗号ヘルパ（Web Crypto: AES-GCM 256bit + PBKDF2）
const _enc = new TextEncoder();
const _dec = new TextDecoder();
const PBKDF2_ITER = 150000;
function _b64(buf) { return btoa(String.fromCharCode.apply(null, new Uint8Array(buf))); }
function _unb64(s) { return Uint8Array.from(atob(s), c => c.charCodeAt(0)); }

async function deriveKey(passphrase, salt) {
  const base = await crypto.subtle.importKey('raw', _enc.encode(passphrase), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt: salt, iterations: PBKDF2_ITER, hash: 'SHA-256' },
    base, { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt']
  );
}
async function encryptObj(key, salt, obj) {
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const ct = await crypto.subtle.encrypt({ name: 'AES-GCM', iv: iv }, key, _enc.encode(JSON.stringify(obj)));
  return JSON.stringify({ v: 1, salt: _b64(salt), iv: _b64(iv), ct: _b64(ct) });
}
async function decryptBlob(key, blobStr) {
  const blob = JSON.parse(blobStr);
  const pt = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: _unb64(blob.iv) }, key, _unb64(blob.ct));
  return JSON.parse(_dec.decode(pt));
}

// 鍵はセッション中だけメモリに保持（保存しない）
let cryptoKey = null;
let vaultSalt = null;

function chaptersToPayload() {
  return {
    chapters: chapters.map(c => ({ name: c.name, lines: c.lines.map(l => l.text) })),
    currentIndex: chapters.findIndex(c => c.id === currentId),
    maxChars: MAX
  };
}
function payloadToChapters(data) {
  chapters = data.chapters.map(c =>
    newChapter(c.name, (c.lines && c.lines.length ? c.lines : ['']).map(t => newLine(t)))
  );
  const idx = data.currentIndex >= 0 && data.currentIndex < chapters.length ? data.currentIndex : 0;
  currentId = chapters[idx].id;
  // 保存されている最大文字数を復元（無ければ既定180）
  setMax(data.maxChars || 180, false);
}

async function save() {
  if (!cryptoKey || !vaultSalt) return;
  try {
    const blob = await encryptObj(cryptoKey, vaultSalt, chaptersToPayload());
    await storageSetRaw(blob);
  } catch (e) { console.error('保存失敗', e); }
}

// ---- ロック / 解除 ----
const lockOverlay = document.getElementById('lockOverlay');
const lockTitle = document.getElementById('lockTitle');
const lockSub = document.getElementById('lockSub');
const lockForm = document.getElementById('lockForm');
const passInput = document.getElementById('passInput');
const passConfirm = document.getElementById('passConfirm');
const lockError = document.getElementById('lockError');
const lockNote = document.getElementById('lockNote');
const unlockBtn = document.getElementById('unlockBtn');
const rememberPass = document.getElementById('rememberPass');
const lockResetRow = document.getElementById('lockResetRow');

let lockMode = 'unlock'; // 'unlock' | 'create'

function showLock(mode) {
  lockMode = mode;
  lockError.textContent = '';
  passInput.value = '';
  passConfirm.value = '';
  rememberPass.checked = !!getCachedPass();
  lockResetRow.hidden = (mode !== 'unlock');
  if (mode === 'create') {
    lockTitle.textContent = 'パスフレーズを設定';
    lockSub.textContent = 'データはこのパスフレーズで暗号化されます。初回のみ設定します。';
    passConfirm.hidden = false;
    lockNote.hidden = false;
    unlockBtn.textContent = '設定して開始';
  } else {
    lockTitle.textContent = 'ロック解除';
    lockSub.textContent = 'パスフレーズを入力してください。';
    passConfirm.hidden = true;
    lockNote.hidden = true;
    unlockBtn.textContent = '解除';
  }
  lockOverlay.hidden = false;
  setTimeout(() => passInput.focus(), 50);
}
function hideLock() { lockOverlay.hidden = true; }

function bootEditor() {
  lines = curChapter().lines;
  renderChapters();
  render();
}

lockForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  lockError.textContent = '';
  const pass = passInput.value;
  if (!pass) { lockError.textContent = 'パスフレーズを入力してください。'; return; }
  unlockBtn.disabled = true;
  try {
    if (lockMode === 'create') {
      if (pass.length < 6) { lockError.textContent = '6文字以上にしてください。'; return; }
      if (pass !== passConfirm.value) { lockError.textContent = '確認用と一致しません。'; return; }
      vaultSalt = crypto.getRandomValues(new Uint8Array(16));
      cryptoKey = await deriveKey(pass, vaultSalt);
      // 既存の平文データがあれば暗号化して移行、なければ新規
      let migrated = false;
      try {
        const legacy = JSON.parse(localStorage.getItem(LEGACY_KEY));
        if (legacy && Array.isArray(legacy.chapters) && legacy.chapters.length) {
          payloadToChapters(legacy);
          migrated = true;
        }
      } catch (e2) {}
      if (!migrated) {
        chapters = [newChapter('章 1')];
        currentId = chapters[0].id;
      }
      await save();
      try { localStorage.removeItem(LEGACY_KEY); } catch (e3) {}
      if (rememberPass.checked) cachePass(pass); else clearCachedPass();
      hideLock();
      bootEditor();
    } else {
      const raw = await storageGetRaw();
      const blob = JSON.parse(raw);
      vaultSalt = _unb64(blob.salt);
      cryptoKey = await deriveKey(pass, vaultSalt);
      const data = await decryptBlob(cryptoKey, raw); // 失敗＝パスフレーズ不一致
      payloadToChapters(data);
      if (rememberPass.checked) cachePass(pass); else clearCachedPass();
      hideLock();
      bootEditor();
    }
  } catch (err) {
    cryptoKey = null;
    lockError.textContent = lockMode === 'create' ? '初期化に失敗しました。' : 'パスフレーズが違います。';
  } finally {
    unlockBtn.disabled = false;
  }
});

function lockNow() {
  clearCachedPass(); // 手動ロック時はキャッシュも破棄（自動再解除しない）
  cryptoKey = null;
  vaultSalt = null;
  chapters = [];
  currentId = null;
  lines = [];
  listEl.innerHTML = '';
  chapterListEl.innerHTML = '';
  statEl.textContent = '';
  overStatEl.textContent = '';
  showLock('unlock');
}
document.getElementById('lockBtn').addEventListener('click', async () => {
  if (await storageGetRaw()) lockNow();
});

// パスフレーズ忘れ時の初期化（全データ削除）
document.getElementById('resetBtn').addEventListener('click', () => {
  if (!confirm('保存された全データを削除し、初期状態に戻します。\nこの操作は取り消せず、暗号化データは復元できません。よろしいですか？')) return;
  if (!confirm('本当に削除しますか？（最終確認）')) return;
  try { localStorage.removeItem(VAULT_KEY); } catch (e) {}
  clearCachedPass();
  cryptoKey = null;
  vaultSalt = null;
  chapters = [];
  currentId = null;
  lines = [];
  showLock('create');
});

// キャッシュされたパスフレーズで自動解除を試みる
async function tryAutoUnlock() {
  const raw = await storageGetRaw();
  const cached = getCachedPass();
  if (!raw || !cached) return false;
  try {
    const blob = JSON.parse(raw);
    vaultSalt = _unb64(blob.salt);
    cryptoKey = await deriveKey(cached, vaultSalt);
    const data = await decryptBlob(cryptoKey, raw);
    payloadToChapters(data);
    hideLock();
    bootEditor();
    return true;
  } catch (e) {
    cryptoKey = null;
    vaultSalt = null;
    clearCachedPass(); // 壊れている/不一致ならキャッシュ破棄
    return false;
  }
}

// ---- クラウド同期設定モーダル ----
const syncOverlay = document.getElementById('syncOverlay');
const syncTokenInput = document.getElementById('syncTokenInput');
const syncMsg = document.getElementById('syncMsg');
function openSync() {
  syncTokenInput.value = getToken() || '';
  syncMsg.textContent = '';
  syncMsg.style.color = '';
  syncOverlay.hidden = false;
  setTimeout(() => syncTokenInput.focus(), 50);
}
document.getElementById('syncBtn').addEventListener('click', openSync);
document.getElementById('lockSyncBtn').addEventListener('click', openSync);
document.getElementById('syncCloseBtn').addEventListener('click', () => { syncOverlay.hidden = true; });
document.getElementById('syncSaveBtn').addEventListener('click', async () => {
  const t = syncTokenInput.value.trim();
  try {
    if (t) localStorage.setItem(SYNC_TOKEN_KEY, t);
    else localStorage.removeItem(SYNC_TOKEN_KEY);
  } catch (e) {}
  if (t && cryptoKey) {
    // 解除済みなら現在のデータをサーバーへ反映
    syncMsg.style.color = 'var(--muted)';
    syncMsg.textContent = '同期中…';
    await save();
    syncMsg.style.color = 'var(--accent)';
    syncMsg.textContent = '同期ONにしました。';
  } else if (t) {
    // ロック中（別端末の初回設定など）→ リモートを取得し直す
    syncMsg.style.color = 'var(--muted)';
    syncMsg.textContent = '取得中…';
    syncOverlay.hidden = true;
    await init();
  } else {
    syncMsg.style.color = 'var(--muted)';
    syncMsg.textContent = '同期OFF（このデバイスのみ）にしました。';
  }
});

async function init() {
  if (await storageGetRaw()) {
    if (await tryAutoUnlock()) return;
    showLock('unlock');
  } else {
    showLock('create');
  }
}

// ---- 章サイドバー ----
function renderChapters() {
  chapterListEl.innerHTML = '';
  chapters.forEach(ch => {
    const item = document.createElement('div');
    item.className = 'chapter' + (ch.id === currentId ? ' active' : '');
    item.addEventListener('click', () => switchChapter(ch.id));

    const name = document.createElement('span');
    name.className = 'chapter-name';
    name.textContent = ch.name;
    name.title = ch.name;

    const cnt = document.createElement('span');
    cnt.className = 'chapter-count';
    cnt.textContent = ch.lines.length;

    const actions = document.createElement('div');
    actions.className = 'chapter-actions';
    const renameBtn = iconBtn('✎', '名前を変更', (e) => { e.stopPropagation(); startRename(ch, item); });
    const delBtn = iconBtn('✕', '章を削除', (e) => { e.stopPropagation(); deleteChapter(ch.id); });
    delBtn.classList.add('del');
    actions.append(renameBtn, delBtn);

    item.append(name, cnt, actions);
    chapterListEl.appendChild(item);
  });
}

function switchChapter(id) {
  if (id === currentId) return;
  currentId = id;
  lines = curChapter().lines;
  renderChapters();
  render();
  save();
}

function addChapter() {
  const ch = newChapter('章 ' + (chapters.length + 1));
  chapters.push(ch);
  currentId = ch.id;
  lines = ch.lines;
  renderChapters();
  render();
  save();
}

function deleteChapter(id) {
  if (chapters.length <= 1) {
    alert('最後の章は削除できません。');
    return;
  }
  const ch = chapters.find(c => c.id === id);
  if (!confirm('章「' + ch.name + '」を削除します。よろしいですか？')) return;
  const idx = chapters.findIndex(c => c.id === id);
  chapters.splice(idx, 1);
  if (currentId === id) {
    currentId = chapters[Math.min(idx, chapters.length - 1)].id;
    lines = curChapter().lines;
    render();
  }
  renderChapters();
  save();
}

function startRename(ch, item) {
  item.innerHTML = '';
  const input = document.createElement('input');
  input.className = 'chapter-rename';
  input.value = ch.name;
  item.appendChild(input);
  input.focus();
  input.select();
  const commit = () => {
    const v = input.value.trim();
    if (v) ch.name = v;
    renderChapters();
    save();
  };
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); commit(); }
    else if (e.key === 'Escape') { renderChapters(); }
  });
  input.addEventListener('blur', commit);
}

document.getElementById('addChapterBtn').addEventListener('click', addChapter);

// ---- レンダリング ----
function render() {
  listEl.innerHTML = '';
  if (lines.length === 0) {
    const e = document.createElement('div');
    e.className = 'empty';
    e.textContent = '行がありません。「+ 行を追加」で作成してください。';
    listEl.appendChild(e);
  }
  lines.forEach((line, idx) => {
    listEl.appendChild(renderCard(line, idx));
  });
  updateStats();
}

function renderCard(line, idx) {
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.id = line.id;

  // ドラッグハンドル
  const handle = document.createElement('div');
  handle.className = 'handle';
  handle.title = 'ドラッグして並べ替え';
  handle.draggable = true;
  handle.innerHTML = '<svg viewBox="0 0 16 16" fill="currentColor"><circle cx="5" cy="3" r="1.4"/><circle cx="11" cy="3" r="1.4"/><circle cx="5" cy="8" r="1.4"/><circle cx="11" cy="8" r="1.4"/><circle cx="5" cy="13" r="1.4"/><circle cx="11" cy="13" r="1.4"/></svg>';

  // 本文
  const body = document.createElement('div');
  body.className = 'body';

  const ta = document.createElement('textarea');
  ta.className = 'line-input';
  ta.rows = 1;
  ta.value = line.text;
  ta.placeholder = 'ここに入力…';
  ta.addEventListener('input', () => {
    // 180文字で強制カット
    if (ta.value.length > MAX) {
      ta.value = ta.value.slice(0, MAX);
    }
    line.text = ta.value;
    autoGrow(ta);
    updateCount(meta, count, ta.value.length);
    updateStats();
  });
  // 改行はEnterで新規行に分割（SNS風に1行=1カード）
  ta.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.isComposing && !e.shiftKey) {
      e.preventDefault();
      // カーソル位置で分割
      const pos = ta.selectionStart;
      const before = ta.value.slice(0, pos);
      const after = ta.value.slice(pos);
      line.text = before;
      const nl = newLine(after);
      lines.splice(idx + 1, 0, nl);
      render();
      focusLine(nl.id, 0);
    }
    // 空行で先頭Backspace → 前の行と結合
    if (e.key === 'Backspace' && ta.selectionStart === 0 && ta.selectionEnd === 0 && idx > 0) {
      e.preventDefault();
      const prev = lines[idx - 1];
      const caret = prev.text.length;
      const merged = (prev.text + line.text).slice(0, MAX);
      prev.text = merged;
      lines.splice(idx, 1);
      render();
      focusLine(prev.id, caret);
    }
  });

  const meta = document.createElement('div');
  meta.className = 'meta';
  const num = document.createElement('span');
  num.className = 'num';
  num.textContent = (idx + 1) + '.';
  const count = document.createElement('span');
  count.className = 'count';
  meta.appendChild(num);
  meta.appendChild(count);
  updateCount(meta, count, line.text.length);

  body.appendChild(ta);
  body.appendChild(meta);

  // アクション
  const actions = document.createElement('div');
  actions.className = 'card-actions';
  const upBtn = iconBtn('▲', '上へ', () => move(idx, idx - 1));
  const downBtn = iconBtn('▼', '下へ', () => move(idx, idx + 1));
  const dupBtn = iconBtn('⧉', '複製', () => {
    lines.splice(idx + 1, 0, newLine(line.text));
    render();
  });
  const delBtn = iconBtn('✕', '削除', () => {
    lines.splice(idx, 1);
    render();
  });
  delBtn.classList.add('del');
  actions.append(upBtn, downBtn, dupBtn, delBtn);

  card.append(handle, body, actions);

  // ドラッグ&ドロップ
  attachDnD(card, handle, idx);

  // 高さ初期調整
  requestAnimationFrame(() => autoGrow(ta));
  return card;
}

function iconBtn(label, title, fn) {
  const b = document.createElement('button');
  b.className = 'icon-btn';
  b.textContent = label;
  b.title = title;
  b.addEventListener('click', fn);
  return b;
}

function autoGrow(ta) {
  ta.style.height = 'auto';
  ta.style.height = ta.scrollHeight + 'px';
}

function updateCount(meta, count, len) {
  count.textContent = len + ' / ' + MAX;
  count.classList.toggle('warn', len >= MAX * 0.9 && len < MAX);
  count.classList.toggle('over', len >= MAX);
}

function updateStats() {
  const total = lines.reduce((s, l) => s + l.text.length, 0);
  statEl.textContent = lines.length + ' 行 / ' + total + ' 文字';
  const atMax = lines.filter(l => l.text.length >= MAX).length;
  overStatEl.textContent = atMax > 0 ? (atMax + ' 行が上限に到達') : '';
  // サイドバーのアクティブ章の行数バッジを更新
  const badge = chapterListEl.querySelector('.chapter.active .chapter-count');
  if (badge) badge.textContent = lines.length;
  scheduleSave();
}

let saveTimer = null;
function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(save, 300);
}

function move(from, to) {
  if (to < 0 || to >= lines.length) return;
  const [item] = lines.splice(from, 1);
  lines.splice(to, 0, item);
  render();
}

function focusLine(id, caret) {
  requestAnimationFrame(() => {
    const card = listEl.querySelector('.card[data-id="' + id + '"]');
    if (!card) return;
    const ta = card.querySelector('.line-input');
    ta.focus();
    const c = caret == null ? ta.value.length : caret;
    ta.setSelectionRange(c, c);
  });
}

// ---- ドラッグ&ドロップ並べ替え ----
let dragId = null;

function attachDnD(card, handle, idx) {
  handle.addEventListener('dragstart', (e) => {
    dragId = card.dataset.id;
    card.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', dragId);
    // カード全体をドラッグ画像に
    e.dataTransfer.setDragImage(card, 20, 20);
  });
  handle.addEventListener('dragend', () => {
    card.classList.remove('dragging');
    clearDropMarks();
    dragId = null;
  });

  card.addEventListener('dragover', (e) => {
    if (dragId == null || dragId === card.dataset.id) return;
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    const rect = card.getBoundingClientRect();
    const after = e.clientY > rect.top + rect.height / 2;
    clearDropMarks();
    card.classList.add(after ? 'drop-after' : 'drop-before');
  });
  card.addEventListener('dragleave', () => {
    card.classList.remove('drop-before', 'drop-after');
  });
  card.addEventListener('drop', (e) => {
    e.preventDefault();
    if (dragId == null) return;
    const rect = card.getBoundingClientRect();
    const after = e.clientY > rect.top + rect.height / 2;
    const fromIdx = lines.findIndex(l => String(l.id) === String(dragId));
    let toIdx = lines.findIndex(l => String(l.id) === String(card.dataset.id));
    if (fromIdx < 0 || toIdx < 0) return;
    const [item] = lines.splice(fromIdx, 1);
    // 取り除いた後のインデックス補正
    toIdx = lines.findIndex(l => String(l.id) === String(card.dataset.id));
    const insertAt = after ? toIdx + 1 : toIdx;
    lines.splice(insertAt, 0, item);
    render();
  });
}

function clearDropMarks() {
  listEl.querySelectorAll('.drop-before, .drop-after')
    .forEach(c => c.classList.remove('drop-before', 'drop-after'));
}

// ---- インポート / エクスポート ----
document.getElementById('importFile').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    const raw = String(reader.result).replace(/\r\n/g, '\n').replace(/\r/g, '\n');
    const rawLines = raw.split('\n');
    const imported = [];
    for (const rl of rawLines) {
      // 180文字を超える行は分割して取り込む
      if (rl.length === 0) {
        imported.push(newLine(''));
      } else {
        for (let i = 0; i < rl.length; i += MAX) {
          imported.push(newLine(rl.slice(i, i + MAX)));
        }
      }
    }
    if (imported.length === 0) imported.push(newLine(''));
    // ファイル名を章名に反映（拡張子を除く）
    const ch = curChapter();
    const base = file.name.replace(/\.[^.]+$/, '');
    if (base) ch.name = base;
    setLines(imported);
    renderChapters();
    render();
    save();
  };
  reader.readAsText(file, 'UTF-8');
  e.target.value = '';
});

function safeFileName(name, fallback) {
  return (name || fallback).replace(/[\\/:*?"<>|]/g, '_').trim() || fallback;
}
function downloadText(text, filename) {
  const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.download = filename;
  a.href = url;
  a.click();
  URL.revokeObjectURL(url);
}

// 現在の章のみエクスポート
document.getElementById('exportBtn').addEventListener('click', () => {
  const text = lines.map(l => l.text).join('\n');
  downloadText(text, safeFileName(curChapter().name, 'lines') + '.txt');
});

// 全章を連結してエクスポート（各章を Markdown 見出し「# 章名」＋空行で区切る）
document.getElementById('exportAllBtn').addEventListener('click', () => {
  const text = chapters
    .map(c => '# ' + c.name + '\n\n' + c.lines.map(l => l.text).join('\n'))
    .join('\n\n');
  downloadText(text, 'all_chapters.md');
});

// ---- 最大文字数の変更 ----
const maxInput = document.getElementById('maxInput');
function setMax(v, persist) {
  v = parseInt(v, 10);
  if (!v || v < 1) v = 1;
  if (v > 100000) v = 100000;
  MAX = v;
  if (maxInput) maxInput.value = v;
  if (persist) { render(); save(); } // ユーザー操作時のみ再描画・保存
}
maxInput.addEventListener('change', () => setMax(maxInput.value, true));

document.getElementById('addBtn').addEventListener('click', addLine);
document.getElementById('addBtn2').addEventListener('click', addLine);
function addLine() {
  const nl = newLine('');
  lines.push(nl);
  render();
  focusLine(nl.id, 0);
}

document.getElementById('clearBtn').addEventListener('click', () => {
  if (!confirm('この章のすべての行を消去します。よろしいですか？')) return;
  setLines([newLine('')]);
  render();
  save();
});

init();
</script>
